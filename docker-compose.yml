services:
  polyglot-pigeon:
    build: .
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro   # credentials never baked into image
      - ./logs:/app/logs                    # persist logs on host
      # Optional: mount a prompt overrides file (path set via pipeline.prompts_path in config.yaml).
      # - ./prompts.yaml:/app/prompts.yaml:ro
