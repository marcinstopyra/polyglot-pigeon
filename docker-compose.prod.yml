services:
  polyglot-pigeon:
    image: ghcr.io/marcinstopyra/polyglot-pigeon:${IMAGE_TAG:-latest}
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
      # Optional: mount a prompt overrides file and pass --prompts to the app.
      # Create prompts.yaml on the host first, then uncomment both lines below:
      # - ./prompts.yaml:/app/prompts.yaml:ro
    # command: ["python", "src/polyglot_pigeon/main.py", "-c", "/app/config.yaml", "--daemon", "--prompts", "/app/prompts.yaml"]
