services:
  polyglot-pigeon:
    image: ghcr.io/marcinstopyra/polyglot-pigeon:${IMAGE_TAG:-latest}
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
      # Optional: mount a prompt overrides file (path set via pipeline.prompts_path in config.yaml).
      # - ./prompts.yaml:/app/prompts.yaml:ro
